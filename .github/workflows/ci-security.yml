name: Security Pipeline

on:
  push:
    branches: ["main", "develop", "release/**"]
  pull_request:
    branches: ["main", "develop"]

permissions:
  contents: read
  security-events: write
  packages: write
  id-token: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  PYTHON_VERSION: "3.11"

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # SAST — Bandit + Semgrep
  # ─────────────────────────────────────────────────────────────────────────────
  sast:
    name: SAST — Bandit + Semgrep
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install SAST tools
        run: |
          pip install bandit[toml] semgrep

      - name: Run Bandit (Python SAST)
        run: |
          bandit -r scripts/ -f json -o bandit-results.json -ll || true
          bandit -r scripts/ -f txt -ll

      - name: Upload Bandit results
        uses: actions/upload-artifact@v4
        with:
          name: bandit-results
          path: bandit-results.json
          retention-days: 30

      - name: Run Semgrep
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/security-audit
            p/python
            p/dockerfile
            p/terraform
            p/kubernetes
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

      - name: Upload Semgrep SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep.sarif
          category: semgrep

  # ─────────────────────────────────────────────────────────────────────────────
  # Secrets Scan — Gitleaks
  # ─────────────────────────────────────────────────────────────────────────────
  secrets-scan:
    name: Secrets Scan — Gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  # ─────────────────────────────────────────────────────────────────────────────
  # Unit Tests
  # ─────────────────────────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests — pytest
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"

      - name: Run pytest with coverage
        run: |
          pytest tests/ \
            --cov=scripts \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=80 \
            -v

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          fail_ci_if_error: false

  # ─────────────────────────────────────────────────────────────────────────────
  # Build Container Image
  # ─────────────────────────────────────────────────────────────────────────────
  build:
    name: Build Container Image
    runs-on: ubuntu-latest
    needs: [sast, secrets-scan, unit-tests]
    outputs:
      image-digest: ${{ steps.build.outputs.digest }}
      image-uri: ${{ steps.meta.outputs.tags }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=sha,prefix=sha-

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          sbom: true
          provenance: true

  # ─────────────────────────────────────────────────────────────────────────────
  # SBOM — Syft SBOM generation
  # ─────────────────────────────────────────────────────────────────────────────
  sbom:
    name: SBOM — Syft
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name != 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Install Syft
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh \
            | sh -s -- -b /usr/local/bin

      - name: Generate SBOM (SPDX + CycloneDX)
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-$(echo ${{ github.sha }} | cut -c1-7)"

          # SPDX JSON format
          syft "$IMAGE" -o spdx-json=sbom.spdx.json

          # CycloneDX JSON format
          syft "$IMAGE" -o cyclonedx-json=sbom.cyclonedx.json

          # Human-readable table
          syft "$IMAGE" -o table

      - name: Analyze SBOM via Python script
        run: |
          python scripts/sbom_generator.py \
            --sbom-file sbom.spdx.json \
            --format spdx \
            --output sbom-report.json

      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sbom-artifacts
          path: |
            sbom.spdx.json
            sbom.cyclonedx.json
            sbom-report.json
          retention-days: 90

  # ─────────────────────────────────────────────────────────────────────────────
  # Container Vulnerability Scan — Trivy
  # ─────────────────────────────────────────────────────────────────────────────
  container-scan:
    name: Container Scan — Trivy + Grype
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
          format: json
          output: trivy-results.json
          exit-code: 0
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH,MEDIUM

      - name: Run Trivy (SARIF for GitHub Security)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
          format: sarif
          output: trivy.sarif

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy.sarif
          category: trivy

      - name: Install Grype
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh \
            | sh -s -- -b /usr/local/bin

      - name: Run Grype vulnerability scanner
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-$(echo ${{ github.sha }} | cut -c1-7)"
          grype "$IMAGE" -o json > grype-results.json || true
          grype "$IMAGE" -o table

      - name: Analyze vulnerability results
        run: |
          python scripts/vulnerability_scanner.py \
            --trivy-file trivy-results.json \
            --grype-file grype-results.json \
            --output vuln-report.json \
            --fail-on CRITICAL

      - name: Upload vulnerability reports
        uses: actions/upload-artifact@v4
        with:
          name: vulnerability-reports
          path: |
            trivy-results.json
            grype-results.json
            vuln-report.json
          retention-days: 30

  # ─────────────────────────────────────────────────────────────────────────────
  # IaC Scan — Checkov for Terraform
  # ─────────────────────────────────────────────────────────────────────────────
  iac-scan:
    name: IaC Scan — Checkov
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Checkov (Terraform)
        uses: bridgecrewio/checkov-action@master
        with:
          directory: terraform/
          framework: terraform
          output_format: sarif
          output_file_path: checkov-terraform.sarif
          soft_fail: true
          skip_check: CKV_AWS_79,CKV2_AWS_12

      - name: Run Checkov (Kubernetes)
        uses: bridgecrewio/checkov-action@master
        with:
          directory: k8s/
          framework: kubernetes
          output_format: sarif
          output_file_path: checkov-k8s.sarif
          soft_fail: true

      - name: Upload Checkov Terraform SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: checkov-terraform.sarif
          category: checkov-terraform

      - name: Upload Checkov K8s SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: checkov-k8s.sarif
          category: checkov-kubernetes

  # ─────────────────────────────────────────────────────────────────────────────
  # Policy Check — Conftest + OPA
  # ─────────────────────────────────────────────────────────────────────────────
  policy-check:
    name: Policy Check — Conftest + OPA
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Conftest
        run: |
          VERSION="0.50.0"
          curl -L "https://github.com/open-policy-agent/conftest/releases/download/v${VERSION}/conftest_${VERSION}_Linux_x86_64.tar.gz" \
            | tar xz
          sudo mv conftest /usr/local/bin/

      - name: Run Conftest on Kubernetes manifests
        run: |
          conftest test k8s/base/ \
            --policy policies/opa/ \
            --output json \
            --all-namespaces \
            2>&1 | tee conftest-k8s-results.json || true
          conftest test k8s/base/ \
            --policy policies/opa/ \
            --output tap \
            --all-namespaces

      - name: Run Conftest on Terraform plans
        run: |
          conftest test terraform/ \
            --policy policies/opa/ \
            --output json \
            2>&1 | tee conftest-tf-results.json || true

      - name: Evaluate OPA policies via Python
        run: |
          pip install -e ".[dev]"
          python scripts/policy_enforcer.py \
            --k8s-results conftest-k8s-results.json \
            --tf-results conftest-tf-results.json \
            --output policy-report.json

      - name: Upload policy results
        uses: actions/upload-artifact@v4
        with:
          name: policy-reports
          path: |
            conftest-k8s-results.json
            conftest-tf-results.json
            policy-report.json
          retention-days: 30

  # ─────────────────────────────────────────────────────────────────────────────
  # Image Signing — Cosign
  # ─────────────────────────────────────────────────────────────────────────────
  sign-image:
    name: Sign Image — Cosign
    runs-on: ubuntu-latest
    needs: [container-scan, sbom, policy-check]
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Sign container image (keyless)
        run: |
          IMAGE_DIGEST="${{ needs.build.outputs.image-digest }}"
          IMAGE_URI="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${IMAGE_DIGEST}"
          cosign sign --yes "$IMAGE_URI"

      - name: Attach SBOM attestation
        run: |
          IMAGE_DIGEST="${{ needs.build.outputs.image-digest }}"
          IMAGE_URI="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${IMAGE_DIGEST}"
          cosign attest --yes \
            --predicate sbom.spdx.json \
            --type spdxjson \
            "$IMAGE_URI"

  # ─────────────────────────────────────────────────────────────────────────────
  # Compliance Report — Aggregate all findings
  # ─────────────────────────────────────────────────────────────────────────────
  compliance-report:
    name: Compliance Report
    runs-on: ubuntu-latest
    needs:
      - sast
      - secrets-scan
      - container-scan
      - iac-scan
      - policy-check
    if: always()
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Download all security artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Generate compliance report
        run: |
          python scripts/compliance_reporter.py \
            --bandit-file artifacts/bandit-results/bandit-results.json \
            --vuln-file artifacts/vulnerability-reports/vuln-report.json \
            --sbom-file artifacts/sbom-artifacts/sbom-report.json \
            --policy-file artifacts/policy-reports/policy-report.json \
            --output-html compliance-report.html \
            --output-json compliance-report.json \
            --framework pci-dss,soc2,cis-kubernetes

      - name: Upload compliance report
        uses: actions/upload-artifact@v4
        with:
          name: compliance-report-${{ github.sha }}
          path: |
            compliance-report.html
            compliance-report.json
          retention-days: 90

      - name: Comment PR with summary
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = JSON.parse(fs.readFileSync('compliance-report.json', 'utf8'));
            const body = `## Security Pipeline Summary\n\n` +
              `| Check | Status | Findings |\n` +
              `|-------|--------|----------|\n` +
              `| SAST (Bandit) | ${report.sast.status} | ${report.sast.count} |\n` +
              `| Vulnerabilities | ${report.vulnerabilities.status} | ${report.vulnerabilities.critical} critical, ${report.vulnerabilities.high} high |\n` +
              `| Policy Compliance | ${report.policies.status} | ${report.policies.violations} violations |\n` +
              `| SBOM Components | ${report.sbom.status} | ${report.sbom.component_count} components |\n\n` +
              `**Overall Compliance Score: ${report.overall_score}%**\n\n` +
              `Full report available in [Actions artifacts](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}).`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });
