name: Weekly Compliance Scan

on:
  schedule:
    # Every Monday at 06:00 UTC
    - cron: "0 6 * * 1"
  workflow_dispatch:
    inputs:
      frameworks:
        description: "Compliance frameworks to check (comma-separated)"
        required: false
        default: "pci-dss,soc2,cis-kubernetes"
      severity_threshold:
        description: "Minimum severity to flag (CRITICAL/HIGH/MEDIUM)"
        required: false
        default: "HIGH"

permissions:
  contents: read
  security-events: write
  issues: write

env:
  PYTHON_VERSION: "3.11"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Full infrastructure vulnerability sweep
  # ─────────────────────────────────────────────────────────────────────────────
  infra-sweep:
    name: Infrastructure Vulnerability Sweep
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: json
          output: trivy-fs-results.json
          severity: ${{ inputs.severity_threshold || 'HIGH' }},CRITICAL
          ignore-unfixed: false

      - name: Run Trivy config scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: .
          format: json
          output: trivy-config-results.json

      - name: Upload sweep results
        uses: actions/upload-artifact@v4
        with:
          name: infra-sweep-${{ github.run_id }}
          path: |
            trivy-fs-results.json
            trivy-config-results.json
          retention-days: 90

  # ─────────────────────────────────────────────────────────────────────────────
  # Dependency audit
  # ─────────────────────────────────────────────────────────────────────────────
  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install audit tools
        run: pip install safety pip-audit

      - name: Run pip-audit (repo scan)
        run: |
          pip-audit --format json --output pip-audit.json || true
          pip-audit --format cyclonedx-json --output pip-audit-sbom.json || true

      - name: Run Safety check
        run: |
          safety check --json --output safety-results.json || true

      - name: Upload dependency audit
        uses: actions/upload-artifact@v4
        with:
          name: dependency-audit-${{ github.run_id }}
          path: |
            pip-audit.json
            pip-audit-sbom.json
            safety-results.json
          retention-days: 90
          if-no-files-found: ignore

  # ─────────────────────────────────────────────────────────────────────────────
  # CIS Kubernetes benchmark
  # ─────────────────────────────────────────────────────────────────────────────
  cis-kubernetes:
    name: CIS Kubernetes Benchmark
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Checkov CIS benchmark
        uses: bridgecrewio/checkov-action@master
        with:
          directory: k8s/
          framework: kubernetes
          check: CKV_K8S_*
          output_format: json
          output_file_path: cis-k8s-results.json
          soft_fail: true

      - name: Upload CIS benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: cis-benchmark-${{ github.run_id }}
          path: cis-k8s-results.json
          retention-days: 90
          if-no-files-found: ignore

  # ─────────────────────────────────────────────────────────────────────────────
  # Terraform security posture
  # ─────────────────────────────────────────────────────────────────────────────
  terraform-posture:
    name: Terraform Security Posture
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run tfsec
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: terraform/
          format: json
          additional_args: --out tfsec-results.json --soft-fail

      - name: Run Checkov Terraform
        uses: bridgecrewio/checkov-action@master
        with:
          directory: terraform/
          framework: terraform
          output_format: json
          output_file_path: checkov-tf-weekly.json
          soft_fail: true

      - name: Upload Terraform posture results
        uses: actions/upload-artifact@v4
        with:
          name: terraform-posture-${{ github.run_id }}
          path: |
            tfsec-results.json
            checkov-tf-weekly.json
          retention-days: 90
          if-no-files-found: ignore

  # ─────────────────────────────────────────────────────────────────────────────
  # Aggregate compliance report
  # ─────────────────────────────────────────────────────────────────────────────
  aggregate-report:
    name: Aggregate Compliance Report
    runs-on: ubuntu-latest
    needs:
      - infra-sweep
      - dependency-audit
      - cis-kubernetes
      - terraform-posture
    if: always()
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install report dependencies
        run: pip install jinja2

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: weekly-artifacts/

      - name: Generate weekly compliance report
        run: |
          python scripts/compliance_reporter.py \
            --vuln-file weekly-artifacts/infra-sweep-${{ github.run_id }}/trivy-fs-results.json \
            --output-html weekly-compliance-report.html \
            --output-json weekly-compliance-report.json \
            --framework "${{ inputs.frameworks || 'pci-dss,soc2,cis-kubernetes' }}" \
            --report-type weekly \
            --run-id ${{ github.run_id }}

      - name: Upload weekly compliance report
        uses: actions/upload-artifact@v4
        with:
          name: weekly-compliance-report-${{ github.run_id }}
          path: |
            weekly-compliance-report.html
            weekly-compliance-report.json
          retention-days: 365

      - name: Create GitHub issue for critical findings
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let report;
            try {
              report = JSON.parse(fs.readFileSync('weekly-compliance-report.json', 'utf8'));
            } catch (e) {
              console.log('No report file found, creating placeholder issue');
              report = { overall_score: 0, critical_findings: 0 };
            }

            if (report.critical_findings > 0 || report.overall_score < 80) {
              const title = `[Weekly Security] Compliance score: ${report.overall_score}% — ${report.critical_findings} critical findings`;
              const body = `## Weekly Compliance Scan Results\n\n` +
                `**Run:** https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\n` +
                `**Date:** ${new Date().toISOString().split('T')[0]}\n` +
                `**Overall Score:** ${report.overall_score}%\n\n` +
                `### Critical Findings: ${report.critical_findings}\n\n` +
                `Please review the full compliance report artifact and address critical findings within 24 hours.\n\n` +
                `- [ ] Review critical vulnerabilities\n` +
                `- [ ] Update dependency audit exceptions\n` +
                `- [ ] Verify policy violations are remediated\n` +
                `- [ ] Re-run compliance scan after fixes`;

              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['security', 'compliance', 'weekly-scan']
              });
            }
