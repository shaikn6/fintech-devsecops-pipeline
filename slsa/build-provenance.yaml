# SLSA Level 3 Build Provenance - GitHub Actions Workflow
# Generates signed SLSA provenance attestations for container images
# using the official slsa-framework/slsa-github-generator.
#
# References:
#   https://slsa.dev/spec/v1.0/levels
#   https://github.com/slsa-framework/slsa-github-generator
#   https://docs.sigstore.dev/cosign/overview

name: SLSA Level 3 Build Provenance

on:
  push:
    branches:
      - main
      - release/**
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to build (defaults to git SHA)'
        required: false
        type: string

permissions:
  contents: read

jobs:
  build:
    name: Build Container Image
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
      id-token: write
    outputs:
      image:        ${{ steps.meta.outputs.tags }}
      digest:       ${{ steps.build.outputs.digest }}
      image_name:   ${{ steps.vars.outputs.image_name }}

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set image variables
        id: vars
        run: |
          REGISTRY="123456789012.dkr.ecr.us-east-1.amazonaws.com"
          IMAGE_NAME="fintech/fintech-api"
          echo "image_name=${REGISTRY}/${IMAGE_NAME}" >> "$GITHUB_OUTPUT"
          echo "registry=${REGISTRY}" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::123456789012:role/github-actions-ecr-push
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.vars.outputs.image_name }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,format=long,prefix=sha-
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
          labels: |
            org.opencontainers.image.title=fintech-api
            org.opencontainers.image.vendor=fintech-platform
            org.opencontainers.image.licenses=Apache-2.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          provenance: false
          sbom: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            VCS_REF=${{ github.sha }}

  provenance:
    name: Generate SLSA Provenance
    needs: [build]
    permissions:
      actions: read
      id-token: write
      packages: write
      contents: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_container_slsa3.yml@v2.0.0
    with:
      image: ${{ needs.build.outputs.image_name }}
      digest: ${{ needs.build.outputs.digest }}
      registry-username: ${{ github.actor }}
      compile-generator: true
    secrets:
      registry-password: ${{ secrets.GITHUB_TOKEN }}

  sign-and-attest:
    name: Sign Image and Attach SBOM
    needs: [build, provenance]
    runs-on: ubuntu-24.04
    permissions:
      id-token: write
      packages: write

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: v2.4.0

      - name: Install Syft (SBOM generator)
        uses: anchore/sbom-action/download-syft@v0
        with:
          syft-version: v1.4.1

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::123456789012:role/github-actions-ecr-push
          aws-region: us-east-1

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Generate SPDX SBOM
        id: sbom
        run: |
          IMAGE_REF="${{ needs.build.outputs.image_name }}@${{ needs.build.outputs.digest }}"
          syft "${IMAGE_REF}" -o spdx-json > sbom.spdx.json
          syft "${IMAGE_REF}" -o cyclonedx-json > sbom.cyclonedx.json

      - name: Sign image with Cosign (keyless OIDC)
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          IMAGE_REF="${{ needs.build.outputs.image_name }}@${{ needs.build.outputs.digest }}"
          cosign sign --yes \
            --rekor-url=https://rekor.sigstore.dev \
            --fulcio-url=https://fulcio.sigstore.dev \
            "${IMAGE_REF}"

      - name: Attest SPDX SBOM
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          IMAGE_REF="${{ needs.build.outputs.image_name }}@${{ needs.build.outputs.digest }}"
          cosign attest --yes \
            --predicate sbom.spdx.json \
            --type spdxjson \
            --rekor-url=https://rekor.sigstore.dev \
            "${IMAGE_REF}"

      - name: Attest CycloneDX SBOM
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          IMAGE_REF="${{ needs.build.outputs.image_name }}@${{ needs.build.outputs.digest }}"
          cosign attest --yes \
            --predicate sbom.cyclonedx.json \
            --type cyclonedx \
            --rekor-url=https://rekor.sigstore.dev \
            "${IMAGE_REF}"

      - name: Verify signature
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          IMAGE_REF="${{ needs.build.outputs.image_name }}@${{ needs.build.outputs.digest }}"
          cosign verify \
            --certificate-identity-regexp="https://github.com/shaikn6/fintech-devsecops-pipeline" \
            --certificate-oidc-issuer=https://token.actions.githubusercontent.com \
            "${IMAGE_REF}"
          echo "Signature verified successfully."

      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ needs.build.outputs.digest }}
          path: |
            sbom.spdx.json
            sbom.cyclonedx.json
          retention-days: 90

  security-scan:
    name: Vulnerability Scan
    needs: [build]
    runs-on: ubuntu-24.04
    permissions:
      security-events: write
      id-token: write

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::123456789012:role/github-actions-ecr-push
          aws-region: us-east-1

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ needs.build.outputs.image_name }}@${{ needs.build.outputs.digest }}"
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: '1'
          ignore-unfixed: true

      - name: Upload Trivy SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif
          category: trivy-container
