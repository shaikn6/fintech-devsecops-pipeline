name: CD — GitOps Deploy

on:
  # Manual, gated deploys only. The Security Pipeline must be green first,
  # but promotion to an environment is a deliberate human action.
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        options: [dev, prod]

permissions:
  contents: write
  id-token: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  AWS_REGION: us-east-1
  EKS_CLUSTER_DEV: fintech-eks-dev
  EKS_CLUSTER_PROD: fintech-eks-prod

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Gate — only deploy if security pipeline passed
  # ─────────────────────────────────────────────────────────────────────────────
  gate:
    name: Deployment Gate
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'push' ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success')
    outputs:
      proceed: ${{ steps.check.outputs.proceed }}
    steps:
      - name: Check deployment eligibility
        id: check
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            echo "proceed=true" >> $GITHUB_OUTPUT
          elif [[ "${{ github.event.workflow_run.conclusion }}" == "success" ]]; then
            echo "proceed=true" >> $GITHUB_OUTPUT
          else
            echo "proceed=false" >> $GITHUB_OUTPUT
          fi

  # ─────────────────────────────────────────────────────────────────────────────
  # Deploy to Dev — ArgoCD GitOps
  # ─────────────────────────────────────────────────────────────────────────────
  deploy-dev:
    name: Deploy to Dev
    runs-on: ubuntu-latest
    needs: [gate]
    if: needs.gate.outputs.proceed == 'true'
    environment:
      name: development
      url: https://argocd.dev.fintech-platform.internal
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITOPS_TOKEN }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_DEV }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig (Dev EKS)
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name ${{ env.EKS_CLUSTER_DEV }}

      - name: Install ArgoCD CLI
        run: |
          VERSION="v2.10.0"
          curl -sSL -o /usr/local/bin/argocd \
            "https://github.com/argoproj/argo-cd/releases/download/${VERSION}/argocd-linux-amd64"
          chmod +x /usr/local/bin/argocd

      - name: Update image tag in GitOps manifests
        run: |
          SHORT_SHA="sha-$(echo ${{ github.sha }} | cut -c1-7)"
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${SHORT_SHA}"

          # Update kustomize overlay for dev
          cd k8s/overlays/dev
          kustomize edit set image app-image="$IMAGE"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --staged --quiet || \
            git commit -m "chore(dev): bump image to ${SHORT_SHA} [skip ci]"
          git push

      - name: Sync ArgoCD application (Dev)
        run: |
          argocd login ${{ secrets.ARGOCD_SERVER_DEV }} \
            --auth-token ${{ secrets.ARGOCD_TOKEN_DEV }} \
            --insecure
          argocd app sync fintech-app-dev \
            --revision HEAD \
            --prune \
            --timeout 300
          argocd app wait fintech-app-dev \
            --health \
            --timeout 300

      - name: Verify deployment health
        run: |
          kubectl rollout status deployment/fintech-app \
            -n fintech-dev \
            --timeout=300s

  # ─────────────────────────────────────────────────────────────────────────────
  # Integration tests against Dev
  # ─────────────────────────────────────────────────────────────────────────────
  integration-tests:
    name: Integration Tests (Dev)
    runs-on: ubuntu-latest
    needs: [deploy-dev]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION || '3.11' }}
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install test dependencies
        run: pip install -e ".[dev]"

      - name: Run integration tests
        run: |
          pytest tests/ \
            -m integration \
            --base-url="${{ secrets.DEV_APP_URL }}" \
            -v
        env:
          APP_ENV: development

  # ─────────────────────────────────────────────────────────────────────────────
  # Deploy to Prod — requires manual approval
  # ─────────────────────────────────────────────────────────────────────────────
  deploy-prod:
    name: Deploy to Prod
    runs-on: ubuntu-latest
    needs: [integration-tests]
    environment:
      name: production
      url: https://argocd.prod.fintech-platform.internal
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITOPS_TOKEN }}

      - name: Configure AWS credentials (Prod)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_PROD }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig (Prod EKS)
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name ${{ env.EKS_CLUSTER_PROD }}

      - name: Update image tag in GitOps manifests (Prod)
        run: |
          SHORT_SHA="sha-$(echo ${{ github.sha }} | cut -c1-7)"
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${SHORT_SHA}"

          cd k8s/overlays/prod
          kustomize edit set image app-image="$IMAGE"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --staged --quiet || \
            git commit -m "chore(prod): promote image to ${SHORT_SHA} [skip ci]"
          git push

      - name: Install ArgoCD CLI
        run: |
          VERSION="v2.10.0"
          curl -sSL -o /usr/local/bin/argocd \
            "https://github.com/argoproj/argo-cd/releases/download/${VERSION}/argocd-linux-amd64"
          chmod +x /usr/local/bin/argocd

      - name: Sync ArgoCD application (Prod)
        run: |
          argocd login ${{ secrets.ARGOCD_SERVER_PROD }} \
            --auth-token ${{ secrets.ARGOCD_TOKEN_PROD }} \
            --insecure
          argocd app sync fintech-app-prod \
            --revision HEAD \
            --prune \
            --timeout 600
          argocd app wait fintech-app-prod \
            --health \
            --timeout 600

      - name: Verify production deployment
        run: |
          kubectl rollout status deployment/fintech-app \
            -n fintech-prod \
            --timeout=600s

      - name: Notify deployment success
        uses: slackapi/slack-github-action@v3.0.3
        with:
          payload: |
            {
              "text": "Production deployment successful",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Production Deployment Successful*\nCommit: `${{ github.sha }}`\nDeployed by: ${{ github.actor }}"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
