# fintech-api Helm values - production defaults
# Override per environment via ArgoCD Application parameters or valueFiles.

global:
  imageRegistry: "123456789012.dkr.ecr.us-east-1.amazonaws.com"
  imagePullSecrets:
    - name: ecr-pull-secret
  storageClass: "gp3-encrypted"

image:
  registry: 123456789012.dkr.ecr.us-east-1.amazonaws.com
  repository: fintech/fintech-api
  tag: "2.4.1"
  digest: ""
  pullPolicy: IfNotPresent

replicaCount: 2

podAnnotations:
  cosign.sigstore.dev/verified: "true"
  cosign.sigstore.dev/sbom: "true"
  prometheus.io/scrape: "true"
  prometheus.io/port: "8080"
  prometheus.io/path: "/metrics"

podLabels:
  app.kubernetes.io/name: fintech-api
  app.kubernetes.io/version: "2.4.1"
  app.kubernetes.io/component: api
  app.kubernetes.io/part-of: fintech-platform
  app.kubernetes.io/managed-by: Helm
  tags.datadoghq.com/env: production
  tags.datadoghq.com/service: fintech-api
  tags.datadoghq.com/version: "2.4.1"

serviceAccount:
  create: false
  name: fintech-api-sa
  automountServiceAccountToken: false

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000
  fsGroupChangePolicy: OnRootMismatch
  seccompProfile:
    type: RuntimeDefault
  supplementalGroups: []

containerSecurityContext:
  allowPrivilegeEscalation: false
  privileged: false
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  capabilities:
    drop:
      - ALL
  seccompProfile:
    type: RuntimeDefault

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

livenessProbe:
  httpGet:
    path: /healthz/live
    port: http
  initialDelaySeconds: 15
  periodSeconds: 20
  timeoutSeconds: 5
  failureThreshold: 3
  successThreshold: 1

readinessProbe:
  httpGet:
    path: /healthz/ready
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 3
  successThreshold: 1

startupProbe:
  httpGet:
    path: /healthz/startup
    port: http
  initialDelaySeconds: 0
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 30

service:
  type: ClusterIP
  port: 80
  targetPort: 8080
  protocol: TCP
  name: http
  annotations: {}

ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "4m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
    cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: api.fintech.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: fintech-api-tls
      hosts:
        - api.fintech.example.com

hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60

pdb:
  enabled: true
  minAvailable: 1

env:
  - name: APP_ENV
    value: production
  - name: LOG_LEVEL
    value: info
  - name: LOG_FORMAT
    value: json
  - name: PORT
    value: "8080"
  - name: METRICS_PORT
    value: "8080"
  - name: DB_SSL_MODE
    value: require
  - name: OTEL_EXPORTER_OTLP_ENDPOINT
    value: http://otel-collector.fintech-monitoring:4318

envFromSecrets:
  - secretName: fintech-api-secrets
    prefix: ""

extraVolumes:
  - name: tmp
    emptyDir: {}
  - name: app-cache
    emptyDir:
      sizeLimit: 100Mi

extraVolumeMounts:
  - name: tmp
    mountPath: /tmp
  - name: app-cache
    mountPath: /app/cache

topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: kubernetes.io/hostname
    whenUnsatisfiable: DoNotSchedule
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: fintech-api
  - maxSkew: 1
    topologyKey: topology.kubernetes.io/zone
    whenUnsatisfiable: ScheduleAnyway
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: fintech-api

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: fintech-api
          topologyKey: kubernetes.io/hostname

networkPolicy:
  enabled: true

nodeSelector:
  kubernetes.io/os: linux

tolerations: []
